      <stop offset="0%" stop-color="#fff6b8" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffd166" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#7aedff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cover" x1="30" y1="216" x2="226" y2="46" gradientUnits="userSpaceOnUse">
