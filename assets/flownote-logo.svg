<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">FLOWnote logo</title>
  <desc id="desc">An open book with a glowing lightbulb above it.</desc>
  <defs>
